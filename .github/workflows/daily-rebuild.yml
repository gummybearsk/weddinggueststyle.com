name: Daily Rebuild (Publish Scheduled Pages)

on:
  schedule:
    # Run daily at 6:00 AM UTC (1:00 AM EST / 10:00 PM PST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Vercel deploy to propagate
        run: sleep 90

      - name: Notify IndexNow (Bing + Yandex)
        run: node scripts/notify-indexnow.js
